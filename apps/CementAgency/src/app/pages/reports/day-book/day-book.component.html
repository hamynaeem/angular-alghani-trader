<div widget class="card border-0 box-shadow">
  <div class="card-header transparent border-0 text-muted">
    <h5 class="mb-2">Day Book</h5>
  </div>

  <div class="card-block widget-body">
    <form #frmFilter="ngForm">
      <div class="row no-pad">
        <div class="col-md-2">
          <label for="dtFrom">From Date:</label>
          <div class="input-group">
            <input
              class="form-control"
              placeholder="yyyy-mm-dd"
              name="dtFrom"
              [(ngModel)]="Filter.FromDate"
              ngbDatepicker
              #dtFrom="ngbDatepicker"
            />
            <div class="input-group-addon">
              <button type="button" class="btn btn-warning" (click)="dtFrom.toggle()">
                <i class="fa fa-calendar"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="col-md-2">
          <label for="dtTo">To Date:</label>
          <div class="input-group">
            <input
              class="form-control"
              placeholder="yyyy-mm-dd"
              name="dtTo"
              [(ngModel)]="Filter.ToDate"
              ngbDatepicker
              #dtTo="ngbDatepicker"
            />
            <div class="input-group-addon">
              <button type="button" class="btn btn-warning" (click)="dtTo.toggle()">
                <i class="fa fa-calendar"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="col-md-2" *ngIf="nWhat === '5'">
          <label for="supplierSelect">Supplier:</label>
          <select
            class="form-control"
            name="supplierSelect"
            [(ngModel)]="Filter.SupplierID"
          >
            <option value="">All Suppliers</option>
            <option *ngFor="let supplier of Suppliers | async" [value]="supplier.SupplierID || supplier.CustomerID">
              {{ supplier.SupplierName || supplier.CustomerName || supplier.AcctName || supplier.Name }}
            </option>
          </select>
        </div>
      </div>

      <div class="row no-pad mt-2">
        <div class="form-group col-md-2">
          <div class="custom-control custom-radio">
            <input class="custom-control-input radio-inline" id="radioDefault" name="radio" type="radio" value="1" [(ngModel)]="nWhat" (change)="TypeChange($event)" />
            <label class="custom-control-label" for="radioDefault">Expense</label>
          </div>
        </div>



        <div class="form-group col-md-2">
          <div class="custom-control custom-radio">
            <input class="custom-control-input radio-inline radio-success" id="radioSuccess" name="radio" type="radio" value="3" [(ngModel)]="nWhat" (change)="TypeChange($event)" />
            <label class="custom-control-label" for="radioSuccess">Vouchers</label>
          </div>
        </div>

        <div class="form-group col-md-2">
          <div class="custom-control custom-radio">
            <input class="custom-control-input radio-inline radio-success" id="radioTransport" name="radio" type="radio" value="6" [(ngModel)]="nWhat" (change)="TypeChange($event)" />
            <label class="custom-control-label" for="radioTransport">Transport</label>
          </div>
        </div>

        <div class="form-group col-md-2">
          <div class="custom-control custom-radio">
            <input checked class="custom-control-input radio-inline radio-info" id="radioSales" name="radio" type="radio" value="4" [(ngModel)]="nWhat" (change)="TypeChange($event)" />
            <label class="custom-control-label" for="radioSales">Sales</label>
          </div>
        </div>

        <div class="form-group col-md-2">
          <div class="custom-control custom-radio">
            <input class="custom-control-input radio-inline radio-warning" id="radioPurchase" name="radio" type="radio" value="5" [(ngModel)]="nWhat" (change)="TypeChange($event)" />
            <label class="custom-control-label" for="radioPurchase">Purchase</label>
          </div>
        </div>

        <div class="col-md-1">
          <div class="form-group">
            <button type="button" class="btn btn-primary form-control" (click)="FilterData()" accesskey="s"><i class="fa fa-search"></i></button>
          </div>
        </div>

        <div class="col-md-1">
          <div class="form-group">
            <button type="button" class="btn btn-primary form-control" (click)="PrintReport()" accesskey="s"><i class="fa fa-print"></i></button>
          </div>
        </div>
        
      </div>
    </form>

    <div id="print-section" class="mt-3">
      <div class="row no-gutter">
        <div class="col-md-12">
          <ft-dynamic-table [Settings]="settings" [Data]="data" (ClickAction)="Clicked($event)" (RowClicked)="RowClicked($event)"></ft-dynamic-table>
        </div>
      </div>
    </div>

    <div class="row no-gutter mt-3">
      <div class="col-md-10"></div>
      <div class="col-md-2">
        <div class="form-group">
          <button type="button" class="btn btn-danger form-control" (click)="CloseAccounts()" accesskey="s">
            <i class="fa fa-lock"></i>
            Post All
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
