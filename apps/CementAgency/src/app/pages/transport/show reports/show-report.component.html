<div widget class="card border-0 box-shadow">
  <div class="card-header transparent border-0 text-muted d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Transport Expense Reports</h5>
    <button type="button" class="btn btn-info btn-sm" (click)="loadReports()" title="Refresh Reports">
      <i class="fa fa-refresh"></i>
      Refresh
    </button>
  </div>

  <div class="card-block widget-body">
    <div class="card border-0 box-shadow p-2">
      <div class="card-body p-2">
        <div class="mb-2" style="max-width: 300px;">
          <select class="form-control form-control-sm" [(ngModel)]="selectedTransportID" (change)="onTransportChange()">
            <option value="">-- All Transports --</option>
            <option *ngFor="let v of Vehicles" [value]="v.TransportID">{{ v.TransportName }}{{ v.VehicleNo ? ' - ' + v.VehicleNo : '' }}</option>
          </select>
        </div>

        <div *ngIf="filteredReports && filteredReports.length > 0" class="table-responsive">
          <table class="table table-sm table-striped">
            <thead>
              <tr>
                <th>Date</th>
                <th>Transport</th>
                <th>Vehicle No</th>
                <th>Description</th>
                 <th class="text-right">Income</th>
                <th class="text-right">Expense</th>
                                <th>Actions</th>

              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let r of filteredReports">
                <td>{{ r.Date }}</td>
                <td>{{ r.TransportName || r.TransportID }}</td>
                <td>{{ r.VehicleNo }}</td>
                <td>
                  <div>{{ r.Description }}</div>
                  <div *ngIf="r.Categories && r.Categories.length" class="small text-muted mt-1">
                    <span *ngFor="let c of r.Categories" class="badge badge-light mr-1">{{ c }}</span>
                  </div>
                </td>
               
                <td class="text-right">{{ r.Income || 0 }}</td>
                <td class="text-right">{{ r.Expense || 0 }}</td>
                <td>
                
                  <button class="btn btn-sm btn-outline-danger" (click)="deleteReport(r)">
                    <i class="fa fa-trash"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div *ngIf="!filteredReports || filteredReports.length === 0">No records found.</div>
      </div>
    </div>
  </div>
</div>
