<div widget class="card border-0 box-shadow">
  <div class="card-header transparent border-0 text-muted">
    <h5 class="mb-3">Orders Report</h5>
  </div>
  <div class="card-block widget-body">
    <form #frmFilter="ngForm">
      <div class="row no-pad">
        <div class="col-md-2">
          <label for="dtFrom">From Date:</label>
          <div class="input-group">
            <input
              class="form-control"
              placeholder="yyyy-mm-dd"
              name="dtFrom"
              [(ngModel)]="Filter.FromDate"
              ngbDatepicker
              #dtFrom="ngbDatepicker"
            />
            <div class="input-group-addon">
              <button
                type="button"
                class="btn btn-warning"
                (click)="dtFrom.toggle()"
              >
                <i class="fa fa-calendar"></i>
              </button>
            </div>
          </div>
        </div>
        <div class="col-md-2">
          <label for="dtTo">To Date:</label>
          <div class="input-group">
            <input
              class="form-control"
              placeholder="yyyy-mm-dd"
              name="dtTo"
              [(ngModel)]="Filter.ToDate"
              ngbDatepicker
              #dtTo="ngbDatepicker"
            />
            <div class="input-group-addon">
              <button
                type="button"
                class="btn btn-warning"
                (click)="dtTo.toggle()"
              >
                <i class="fa fa-calendar"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="col-md-2">
          <div class="form-group">
            <label for="status">Status</label>

            <select
              class="form-control"
              [(ngModel)]="Filter.Status"
              name="status"
              id="status"
            >
              <option value="">All</option>
              <option *ngFor="let s of getStatusList()" [value]="s">{{ s }}</option>
            </select>
          </div>
        </div>

        <div class="col-md-6">
          <div class="row no-gutter">
            <div class="form-group col-md-5">
              <label for="customer">Customer</label>
              <ng-select
                #cmbCustomers
                name="ng2select"
                class="custom"
                [items]="Accounts | async"
                [virtualScroll]="true"
                bindLabel="CustomerName"
                bindValue="CustomerID"
                placeholder="Select Customer"
                [(ngModel)]="Filter.CustomerID"
                (change)="CustomerSelected($event)"
              >
                <ng-template ng-option-tmp let-item="item">
                  <div class="row no-gutter">
                    <div class="col-md-8">
                      {{ item.CustomerName }}
                    </div>
                    <div class="col-md-3 text-italic font-small-2 mt-1">
                      <small>
                        {{ item.City }}
                      </small>
                    </div>
                  </div>
                </ng-template>
              </ng-select>
            </div>

            <div class="col-md-2">
              <div class="form-group">
                <label>&nbsp;</label>
                <button
                  type="submit"
                  class="btn btn-primary form-control"
                  (click)="FilterData()"
                  accesskey="a"
                >
                  <i class="fa fa-search"></i>
                  Filter
                </button>
              </div>
            </div>
            <div class="col-md-2">
              <div class="form-group">
                <label>&nbsp;</label>
                <button
                  type="button"
                  class="btn btn-primary form-control"
                  (click)="PrintReport()"
                  accesskey="P"
                >
                  <i class="fa fa-print"></i>
                  Print
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>
    <div class="row no-gutter" id="print-section">
      <div class="col-md-12">
        <!-- Add Order Button -->
        <button class="btn btn-success mb-3" (click)="showAddOrderForm = !showAddOrderForm">
          <i class="fa fa-plus"></i> Add Order
        </button>

        <!-- Add Order Form -->
        <form *ngIf="showAddOrderForm" (ngSubmit)="addOrder()" #addOrderForm="ngForm" class="mb-4 border p-3 bg-light rounded">
          <div class="row">
            <div class="col-md-2">
              <input type="text" class="form-control mb-2" name="OrderID" placeholder="Order No" [(ngModel)]="newOrder.OrderID" required />
            </div>
            <div class="col-md-2">
              <input type="date" class="form-control mb-2" name="OrderDate" placeholder="Order Date" [(ngModel)]="newOrder.OrderDate" required />
            </div>
            <div class="col-md-2">
              <input type="date" class="form-control mb-2" name="DeliveryDate" placeholder="Delivery Date" [(ngModel)]="newOrder.DeliveryDate" />
            </div>
            <div class="col-md-2">
              <select class="form-control mb-2" name="CustomerName" [(ngModel)]="newOrder.CustomerName" required>
                <option value="">Select Customer</option>
                <option *ngFor="let c of Customers" [value]="c.CustomerName">{{ c.CustomerName }}</option>
              </select>
            </div>
            <div class="col-md-2">
              <input type="text" class="form-control mb-2" name="DeliveryAddress" placeholder="Delivery Address" [(ngModel)]="newOrder.DeliveryAddress" />
            </div>
            <div class="col-md-2">
              <select class="form-control mb-2" name="ProductName" [(ngModel)]="newOrder.ProductName" required>
                <option value="">Select Product</option>
                <option *ngFor="let p of Products" [value]="p.ProductName">{{ p.ProductName }}</option>
              </select>
            </div>
            <div class="col-md-1">
              <input type="number" class="form-control mb-2" name="Quantity" placeholder="Qty" [(ngModel)]="newOrder.Quantity" required />
            </div>
            <div class="col-md-1">
              <input type="number" class="form-control mb-2" name="Total" placeholder="Amount" [(ngModel)]="newOrder.Total" required />
            </div>
            <div class="col-md-2">
              <select class="form-control mb-2" name="Status" [(ngModel)]="newOrder.Status" required>
                <option value="">Status</option>
                <option *ngFor="let s of getStatusList()" [value]="s">{{ s }}</option>
              </select>
            </div>
            <div class="col-md-2">
              <button type="submit" class="btn btn-primary mr-2">Save</button>
              <button type="button" class="btn btn-secondary" (click)="showAddOrderForm = false">Cancel</button>
            </div>
          </div>
        </form>
        <ft-dynamic-table
          #RptTable
          [Settings]="setting"
          [Data]="data"
          (ClickAction)="Clicked($event)"
        ></ft-dynamic-table>
      </div>
    </div>
  </div>
</div>
